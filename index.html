<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#020617" />
  <script>
    try {
      const theme = localStorage.getItem('vite-ui-theme') || 'system'
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      const isLight = theme === 'light' || (theme === 'system' && !prefersDark)

      if (isLight) {
        document.documentElement.classList.add('light')
        document.querySelector('meta[name="theme-color"]').content = '#F8FAFC'
      }
    } catch { }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..700&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon_slashes.svg" />
  <title>mycode</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
