<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .slash { stroke: #1e293b; }
    @media (prefers-color-scheme: dark) {
      .slash { stroke: #f8fafc; }
    }
  </style>
  <!-- 主斜杠：科技蓝色 -->
  <line x1="45" y1="85" x2="75" y2="15" stroke="#3b82f6" stroke-width="18" stroke-linecap="round"/>
  <!-- 副斜杠：自适应黑白色 -->
  <line class="slash" x1="20" y1="85" x2="50" y2="15" stroke-width="18" stroke-linecap="round"/>
</svg>
